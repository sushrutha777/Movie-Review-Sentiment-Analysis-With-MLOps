services:
  - type: web
    name: movie-sentiment-app
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: streamlit run app/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: TF_USE_LEGACY_KERAS
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.11"
